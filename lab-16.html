<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Lab 16 Final</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #fafafa;
}
.wrap {
  display: flex;
  gap: 30px;
  justify-content: center;
}
svg {
  background: white;
  border: 2px solid black;
}
/* Tooltip styles */
#tooltip {
  position: absolute;
  visibility: hidden;
  background: white;
  border: 1px solid black;
  padding: 8px;
  pointer-events: none;
}
</style>
</head>

<body>

<h2 id="title" style="text-align:center">World Happiness Map</h2>

<div class="wrap">
  <svg id="map" width="700" height="500"></svg>
  <svg id="bar" width="350" height="350"></svg>
</div>

<div id="tooltip"></div>

<script>
async function load() {
  const geo = await d3.json(
    "https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson"
  );
  const csv = await d3.csv("2019.csv");
  console.log("CSV rows:", csv.length);
  drawMap(geo, csv);
  drawBar(); // initial placeholder
}

function drawMap(geo, csv) {
  const svg = d3.select("#map");
  const width = 700;
  const height = 500;
  svg.selectAll("*").remove();

  const projection = d3.geoNaturalEarth1()
    .scale(130)
    .translate([width / 2, height / 2]);
  const path = d3.geoPath(projection);

  // Map country names to scores
  const scoreMap = new Map();
  csv.forEach(d => {
    scoreMap.set(d.Country, +d.Score);
  });

  const scores = Array.from(scoreMap.values());
  const minScore = d3.min(scores);
  const maxScore = d3.max(scores);

  const color = d3.scaleSequential()
    .domain([minScore, maxScore])
    .interpolator(d3.interpolateViridis);

  // Draw countries
  svg.append("g")
    .selectAll("path")
    .data(geo.features)
    .join("path")
    .attr("d", path)
    .attr("fill", d => {
      const countryName = d.properties.name;
      const score = scoreMap.get(countryName);
      return score !== undefined ? color(score) : "#eee";
    })
    .attr("stroke", "#999")
    .on("mouseover", (event, d) => {
      const countryName = d.properties.name;
      const score = scoreMap.get(countryName);
      d3.select("#tooltip")
        .style("visibility", "visible")
        .style("top", (event.pageY + 10) + "px")
        .style("left", (event.pageX + 10) + "px")
        .html(`<b>${countryName}</b><br/>Score: ${score !== undefined ? score : "N/A"}`);
    })
    .on("mousemove", (event) => {
      d3.select("#tooltip")
        .style("top", (event.pageY + 10) + "px")
        .style("left", (event.pageX + 10) + "px");
    })
    .on("mouseout", () => {
      d3.select("#tooltip").style("visibility", "hidden");
    })
    .on("click", (event, d) => {
      const countryName = d.properties.name;
      const row = csv.find(c => c.Country === countryName);
      if (row) {
        drawBar(row);
        d3.select("#title").text("Happiness Factors — " + row.Country);
      }
    });

  // Add color legend with label
  const defs = svg.append("defs");
  const gradientId = "legendGradient";

  const gradient = defs.append("linearGradient")
    .attr("id", gradientId);

  const stops = 10;
  d3.range(stops).forEach(i => {
    gradient.append("stop")
      .attr("offset", `${(i / (stops - 1)) * 100}%`)
      .attr("stop-color", d3.interpolateViridis(i / (stops - 1)));
  });

  const legendWidth = 200;
  const legendHeight = 20;

  // Draw gradient rect for legend
  svg.append("g")
    .attr("class", "legend")
    .attr("transform", `translate(${width - legendWidth - 30}, ${height - 50})`)
    .append("rect")
    .attr("width", legendWidth)
    .attr("height", legendHeight)
    .style("fill", `url(#${gradientId})`);

  // Add label next to color scale
  svg.append("g")
    .attr("class", "legend-label")
    .attr("transform", `translate(${width - legendWidth - 30}, ${height - 70})`)
    .append("text")
    .text("Happiness Score")
    .attr("font-size", "12px")
    .attr("fill", "#000");

  // Min & Max labels
  svg.append("g")
    .attr("transform", `translate(${width - legendWidth - 30}, ${height - 30})`)
    .selectAll("text")
    .data([minScore, maxScore])
    .join("text")
    .attr("x", (d, i) => i * legendWidth)
    .attr("y", 0)
    .attr("dy", "1em")
    .text(d => d.toFixed(0))
    .attr("text-anchor", (d, i) => i === 0 ? "start" : "end");
}

function drawBar(country = null) {
  const svg = d3.select("#bar");
  svg.selectAll("*").remove();

  const width = 350;
  const height = 350;
  const margin = { top:30, right:20, bottom:80, left:60 };

  if (!country) {
    svg.append("text")
      .attr("x", width/2)
      .attr("y", height/2)
      .attr("text-anchor", "middle")
      .text("Click any country");
    return;
  }

  // Compose factors
  const factors = [
    {name: "GDP", value: +country.GDP},
    {name: "Social", value: +country.Social_support},
    {name: "Health", value: +country.Healthy_life_expectancy},
    {name: "Freedom", value: +country.Freedom_to_make_life_choices},
    {name: "Generosity", value: +country.Generosity},
    {name: "Perceptions of corruption", value: +country.Perceptions_of_corruption}
  ];

  // Sort factors descending
  factors.sort((a,b) => b.value - a.value);

  const x = d3.scaleBand()
    .domain(factors.map(d => d.name))
    .range([margin.left, width - margin.right])
    .padding(0.4);

  const y = d3.scaleLinear()
    .domain([0, d3.max(factors, d => d.value)])
    .range([height - margin.bottom, margin.top]);

  // Axes
  svg.append("g")
    .attr("transform", `translate(0, ${height - margin.bottom})`)
    .call(d3.axisBottom(x))
    .selectAll("text")
    .attr("transform", "rotate(-40)")
    .attr("text-anchor", "end");

  svg.append("g")
    .attr("transform", `translate(${margin.left},0)`)
    .call(d3.axisLeft(y));

  // Bars with transition
  svg.selectAll("rect")
    .data(factors)
    .join("rect")
    .attr("x", d => x(d.name))
    .attr("width", x.bandwidth())
    .attr("y", y(0))
    .attr("height", 0)
    .attr("fill","#69b3a2")
    .transition()
    .duration(700)
    .attr("y", d => y(d.value))
    .attr("height", d => y(0) - y(d.value));
}

load();
</script>
</body>
</html>
